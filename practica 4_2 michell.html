<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        span {
            display: inline; /* Valor por defecto para span, a, strong, em, etc. */
            /* width y height no tienen efecto */
            /* margin-top y margin-bottom no tienen efecto */
            background-color: aquamarine;
            border: 2px solid green;
            margin: 20px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <span>pan 1</span>
    <span>pan 2</span>
    <span>pan 3</span>
</body>
</html>
