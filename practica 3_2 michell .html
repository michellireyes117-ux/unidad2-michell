<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    p {
  /* Palabras clave */
color: blue;

/* Código hexadecimal (6 dígitos) */
color: #4a90e2; /* Azul claro */

/* Código hexadecimal (3 dígitos) */
color: #4ae; /* Equivale a #44aaee */

/* RGB (Red, Green, Blue) */
color: rgb(74, 144, 226);

/* RGBA (con transparencia) */
color: rgba(74, 144, 226, 0.7); /* 0.7 es la opacidad (70%) */

/* HSL (Hue, Saturation, Lightness) */
color: hsl(210, 75%, 59%);

/* HSLA (con transparencia) */
color: hsla(210, 75%, 59%, 0.7);

/* Color de fondo */
background-color: #f0f7ff; /* Azul muy claro */

/* Color de borde */
border: 1px solid #2e7d32; /* Verde esmeralda */ 
}
</style>
</head>
<body>
    <p>amo a spiderman</p>
</body>
</html>
